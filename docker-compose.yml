# Local development stack — MongoDB 7 + Mongo Express UI
# Usage:
#   docker compose up -d          # start
#   docker compose down           # stop (keeps volumes)
#   docker compose down -v        # stop + wipe data
#
# Production does NOT use this file. Prod uses MongoDB Atlas.
# The app reads `MONGODB_URI` from env, so switching is just an env change.

services:
  mongodb:
    image: mongo:7
    container_name: myportfolio-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: devpassword
      MONGO_INITDB_DATABASE: myportfolio
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "-u", "admin", "-p", "devpassword", "--authenticationDatabase", "admin", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  mongo-express:
    image: mongo-express:1.0.2
    container_name: myportfolio-mongo-express
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: devpassword
      ME_CONFIG_MONGODB_URL: mongodb://admin:devpassword@mongodb:27017/?authSource=admin
      ME_CONFIG_BASICAUTH: "true"
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: devpassword
      ME_CONFIG_SITE_BASEURL: /
    ports:
      - "8081:8081"

volumes:
  mongodb_data:
  mongodb_config:
